name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            npm_platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            npm_platform: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            npm_platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            npm_platform: darwin-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            npm_platform: win32-x64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # aarch64-unknown-linux-gnu needs `cross` (avoids the missing
      # gcc-aarch64-linux-gnu sysroot on plain ubuntu-latest runners).
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      # --features vector-local bundles the candle local-embedding backend so the
      # shipped binary embeds offline (zero user setup). candle is pure Rust on
      # CPU, so it cross-compiles to every target with the standard toolchain.
      - name: Build (cargo)
        if: matrix.cross != true
        run: cargo build --release --bin umadev --features vector-local --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --bin umadev --features vector-local --target ${{ matrix.target }}

      - name: Stage binary into dist/ + npm/
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/umadev${{ matrix.ext }}" \
             "dist/umadev-${{ matrix.target }}${{ matrix.ext }}"
          # Also stage into the matching npm sub-package so the publish
          # job downstream finds binaries ready to ship.
          ./npm/scripts/stage.sh "${{ matrix.npm_platform }}" \
              "target/${{ matrix.target }}/release/umadev${{ matrix.ext }}"

      - name: Upload binary (GitHub Releases artifact)
        uses: actions/upload-artifact@v4
        with:
          name: umadev-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Upload staged npm sub-package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}
          path: npm/cli-${{ matrix.npm_platform }}/
          if-no-files-found: error

  publish-github:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: umadev-*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Pull every staged platform sub-package back into npm/cli-<plat>/.
      - uses: actions/download-artifact@v4
        with:
          path: npm-staging
          pattern: npm-*

      - name: Re-hydrate npm/cli-*/ from staged artifacts
        run: |
          set -euo pipefail
          for d in npm-staging/npm-*; do
            platform="${d##*npm-}"
            cp -r "$d/." "npm/cli-${platform}/"
            chmod +x "npm/cli-${platform}/bin/"* 2>/dev/null || true
          done
          # Sanity: every sub-package must have its binary.
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            case "$plat" in win32-x64) bin="umadev.exe" ;; *) bin="umadev" ;; esac
            test -f "npm/cli-$plat/bin/$bin" || {
              echo "missing npm/cli-$plat/bin/$bin" >&2; exit 1;
            }
          done

      # Fetch the bundled embedding model into the platform-independent model
      # package so `@umadev/model-e5-small` ships the weights once for all OSes.
      # The binary loads it via candle for offline, zero-setup retrieval; if this
      # ever fails the binary still works (fail-open to BM25).
      # TODO(maintainer): pin to a revision SHA + verify sha256 before first GA.
      - name: Fetch bundled embedding model
        run: |
          set -euo pipefail
          DIR=npm/model-e5-small
          BASE=https://huggingface.co/intfloat/multilingual-e5-small/resolve/main
          curl -fsSL "$BASE/config.json"       -o "$DIR/config.json"
          curl -fsSL "$BASE/tokenizer.json"    -o "$DIR/tokenizer.json"
          curl -fsSL "$BASE/model.safetensors" -o "$DIR/model.safetensors"
          ls -la "$DIR"

      - name: npm publish (platforms + main)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./npm/scripts/publish.sh
