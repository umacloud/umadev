name: Deploy website to GitHub Pages

on:
  push:
    branches: [public-main, main]
    paths:
      - "Cargo.toml"
      - "npm/*/package.json"
      - "npm/scripts/verify-version-lock.mjs"
      - "umadev-website/**"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: umadev-website
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: umadev-website/package-lock.json

      - name: Verify release version lock
        working-directory: ${{ github.workspace }}
        run: node npm/scripts/verify-version-lock.mjs

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_REPO: umadev
          GITHUB_PAGES_DOMAIN: umadev.goder.ai
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: umadev-website/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
