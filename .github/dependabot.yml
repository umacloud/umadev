version: 2
updates:
  # Keep the public repository on a single persistent branch. Dependency and
  # vulnerability scanning still run in CI, but routine version updates are
  # reviewed and applied deliberately on `main` instead of opening bot branches.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/umadev-website"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    groups:
      npm:
        patterns:
          - "*"
